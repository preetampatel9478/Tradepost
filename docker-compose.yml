version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: tradepost-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: tradepost
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - tradepost-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7.0-alpine
    container_name: tradepost-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tradepost-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: tradepost-api
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://root:password@mongodb:27017/tradepost?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret_key_change_in_production
      FIREBASE_PROJECT_ID: your_project_id
      FIREBASE_PRIVATE_KEY: your_private_key
      FIREBASE_CLIENT_EMAIL: your_client_email
      SOCKET_CORS_ORIGIN: http://localhost:19000,http://localhost:5000
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - tradepost-network

networks:
  tradepost-network:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
